ai_usage_summary: |
  Used Claude for architecture discussion and code review.
  All scoring logic, weight decisions, and engineering choices
  were made and validated by the participant.
  No candidate data was fed to any external LLM at any point.

methodology_summary: |
  Five-component hybrid scoring system that ranks candidates the way a
  great recruiter would — not by keyword matching, but by understanding
  genuine fit. Components: Title Fit (25%), Skill Quality (25%), Career
  Signal (20%), Experience Fit (15%), Behavioral Score (15%). Title scoring
  is the primary honeypot and keyword-stuffer trap killer. Skill scoring
  uses an endorsement-and-duration trust multiplier to penalize ghost
  skills. Career scoring rewards product-company and AI-relevant work
  history while penalizing pure IT services careers. Behavioral scoring
  uses all 23 Redrob platform signals including recency, open-to-work
  flag, notice period, GitHub activity, and recruiter response rate.
  Runtime ~9 seconds for 100K candidates on CPU with no network calls.

